server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ─── Servicio de Usuarios ──────────────────────────────
        - id: usuarios-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/usuarios/**, /api/v1/admin/usuarios/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: usuariosCircuitBreaker
                fallbackUri: forward:/fallback/usuarios

        # ─── Swagger del microservicio desde el gateway ────────
        - id: usuarios-swagger
          uri: http://localhost:8081
          predicates:
            - Path=/swagger/usuarios/**
          filters:
            - RewritePath=/swagger/usuarios(?<segment>.*), $\{segment}

      # CORS global
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"

      # Timeouts
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

# Resilience4j - Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      usuariosCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
