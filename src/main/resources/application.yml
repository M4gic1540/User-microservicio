server:
  port: 8081

spring:
  application:
    name: usuarios-service

  datasource:
    url: jdbc:postgresql://localhost:5432/shopsmart_usuarios
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ShopSmartSecretKey2024SuperSeguraParaProduccion!}
  expiration: 86400000        # 24 horas en ms
  refresh-expiration: 604800000  # 7 días en ms

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: ShopSmart - Servicio de Usuarios
    description: API REST para gestión de usuarios, autenticación y personalización
    version: 1.0.0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.shopsmart: DEBUG
    org.springframework.security: INFO
